name: Crawl Movies

on:
  # 매일 밤 11시 (한국 시간)
  schedule:
    - cron: '0 15 * * *'  # UTC 15:00 = KST 00:00

  # 수동 실행
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install node-fetch cheerio firebase

      - name: Run optimized crawler
        run: node crawl-movies-optimized.js

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "chore: update crawled movie data (optimized cheerio)"
            git push
          fi
