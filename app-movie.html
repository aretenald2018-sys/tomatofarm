<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="영화 캘린더 - 무코 데이터">
  <meta name="theme-color" content="#1a1a1a">
  <title>영화 캘린더</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --text: #f0f0f0;
      --muted: #a0a0a0;
      --surface1: #252525;
      --surface2: #1f1f1f;
      --surface3: #2a2a2a;
      --border: #3a3a3a;
      --accent: #ff9500;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #1a1a1a;
      color: var(--text);
      padding: 8px;
    }

    .header {
      background: var(--surface1);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
      text-align: center;
    }

    .header h1 {
      font-size: 24px;
      margin-bottom: 8px;
      color: var(--accent);
    }

    .header p {
      font-size: 12px;
      color: var(--muted);
    }

    .auth-panel {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
      text-align: center;
    }

    .auth-input {
      padding: 10px 12px;
      background: var(--surface1);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 14px;
      margin-bottom: 12px;
    }

    .auth-btn {
      padding: 10px 20px;
      background: var(--accent);
      color: #1a1a1a;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
    }

    .auth-btn:active {
      opacity: 0.8;
    }

    .content {
      display: none;
    }

    .content.visible {
      display: block;
    }

    .nav-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      background: var(--surface1);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 12px;
    }

    .nav-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
    }

    .month-title {
      font-weight: 600;
      font-size: 16px;
    }

    .calendar {
      background: var(--surface1);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }

    .weekday {
      padding: 8px;
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
    }

    .days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
      background: var(--border);
      padding: 1px;
    }

    .day {
      background: var(--surface1);
      min-height: 100px;
      padding: 8px;
      font-size: 12px;
      overflow-y: auto;
    }

    .day.empty {
      background: var(--surface2);
    }

    .day-num {
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--accent);
    }

    .movie-item {
      background: var(--surface2);
      border-left: 3px solid var(--accent);
      padding: 4px;
      margin-bottom: 3px;
      border-radius: 3px;
      font-size: 10px;
      line-height: 1.3;
      word-break: break-word;
    }

    .movie-title {
      font-weight: 500;
      margin-bottom: 2px;
    }

    .movie-tags {
      display: flex;
      gap: 2px;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 8px;
      padding: 1px 3px;
      border-radius: 2px;
      background: rgba(255, 149, 0, 0.2);
      color: var(--accent);
    }

    .footer {
      padding: 12px;
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      margin-top: 12px;
    }
  </style>
</head>
<body>

<div class="header">
  <h1>🎬 영화 캘린더</h1>
  <p>무코(muko.kr) 기반</p>
</div>

<!-- 인증 패널 -->
<div class="auth-panel" id="auth-panel">
  <p style="margin-bottom:12px">액세스 토큰을 입력하세요</p>
  <input
    type="password"
    class="auth-input"
    id="token-input"
    placeholder="토큰 입력"
    onkeydown="if(event.key==='Enter') authenticate()"
  >
  <button class="auth-btn" onclick="authenticate()">접속</button>
  <p style="font-size:10px;color:var(--muted);margin-top:12px">
    또는 URL에 ?token=xxx 추가
  </p>
</div>

<!-- 콘텐츠 -->
<div class="content" id="content">
  <div class="nav-header">
    <button class="nav-btn" onclick="prevMonth()">◀</button>
    <div class="month-title" id="month-label">로딩중...</div>
    <button class="nav-btn" onclick="nextMonth()">▶</button>
  </div>

  <div class="calendar">
    <div class="weekdays">
      <div class="weekday">월</div>
      <div class="weekday">화</div>
      <div class="weekday">수</div>
      <div class="weekday">목</div>
      <div class="weekday">금</div>
      <div class="weekday">토</div>
      <div class="weekday">일</div>
    </div>
    <div class="days" id="calendar"></div>
  </div>
</div>

<div class="footer">
  <p>데이터 출처: <a href="https://muko.kr/calender" style="color:var(--accent);text-decoration:none">무코</a></p>
  <p style="margin-top:4px">마지막 업데이트: <span id="last-updated">-</span></p>
</div>

<script>
  // ════════════════════════════════════════════════════════════
  // 유효한 토큰 목록 (GitHub Pages 배포 시 환경변수로 관리 권장)
  // ════════════════════════════════════════════════════════════
  const VALID_TOKENS = [
    'token_user1_demo',
    'token_user2_demo',
    'token_user3_demo',
    'token_user4_demo',
    'token_user5_demo',
  ];

  // Firebase 설정
  const FIREBASE_CONFIG = {
    projectId: "exercise-management",
    // 읽기 전용이므로 최소 정보만 필요
  };

  let currentYear = new Date().getFullYear();
  let currentMonth = new Date().getMonth() + 1;

  // ════════════════════════════════════════════════════════════
  // 인증
  // ════════════════════════════════════════════════════════════
  function authenticate() {
    const token = document.getElementById('token-input').value.trim();
    if (!token) return alert('토큰을 입력하세요');

    if (VALID_TOKENS.includes(token)) {
      sessionStorage.setItem('movie_token', token);
      showContent();
      renderCalendar();
    } else {
      alert('유효하지 않은 토큰입니다');
    }
  }

  function checkAuth() {
    // URL 파라미터 확인
    const urlParams = new URLSearchParams(window.location.search);
    const urlToken = urlParams.get('token');
    if (urlToken && VALID_TOKENS.includes(urlToken)) {
      sessionStorage.setItem('movie_token', urlToken);
      showContent();
      renderCalendar();
      return;
    }

    // 세션 저장소 확인
    if (sessionStorage.getItem('movie_token')) {
      showContent();
      renderCalendar();
      return;
    }

    // 인증 필요
    document.getElementById('auth-panel').style.display = 'block';
  }

  function showContent() {
    document.getElementById('auth-panel').style.display = 'none';
    document.getElementById('content').classList.add('visible');
  }

  // ════════════════════════════════════════════════════════════
  // 캘린더 렌더링
  // ════════════════════════════════════════════════════════════
  async function renderCalendar() {
    document.getElementById('month-label').textContent = `${currentYear}년 ${currentMonth}월`;

    // 샘플 데이터 (실제로는 Firebase에서 로드)
    const events = await loadMovieData(currentYear, currentMonth);

    const days = getDaysInMonth(currentYear, currentMonth);
    const firstDay = new Date(currentYear, currentMonth - 1, 1).getDay();
    const startMonday = firstDay === 0 ? 6 : firstDay - 1;

    const calendar = document.getElementById('calendar');
    calendar.innerHTML = '';

    // 이전 달 패딩
    for (let i = 0; i < startMonday; i++) {
      const day = document.createElement('div');
      day.className = 'day empty';
      calendar.appendChild(day);
    }

    // 현재 달 날짜
    for (let d = 1; d <= days; d++) {
      const day = document.createElement('div');
      day.className = 'day';

      const dayNum = document.createElement('div');
      dayNum.className = 'day-num';
      dayNum.textContent = d;
      day.appendChild(dayNum);

      // 해당 날짜의 이벤트
      const dayEvents = events.filter(e => e.date === d);
      dayEvents.forEach(evt => {
        const item = document.createElement('div');
        item.className = 'movie-item';
        item.innerHTML = `
          <div class="movie-title">${evt.title}</div>
          <div class="movie-tags">
            ${(evt.tags || []).map(tag => `<span class="tag">${tag}</span>`).join('')}
          </div>
        `;
        day.appendChild(item);
      });

      calendar.appendChild(day);
    }
  }

  async function loadMovieData(year, month) {
    // 실제 구현: Firestore에서 로드
    // 여기서는 샘플 데이터 반환
    const sampleData = {
      '2026-03': [
        { date: 1, title: '부산시네마 아차데', tags: ['시사회'] },
        { date: 5, title: '우리에게는 미래', tags: ['개봉'] },
      ],
      '2026-04': [
        { date: 2, title: '아바타: 물의 길', tags: ['개봉'] },
      ]
    };

    const key = `${year}-${String(month).padStart(2, '0')}`;
    return sampleData[key] || [];
  }

  function getDaysInMonth(year, month) {
    return new Date(year, month, 0).getDate();
  }

  function prevMonth() {
    currentMonth--;
    if (currentMonth < 1) {
      currentMonth = 12;
      currentYear--;
    }
    renderCalendar();
  }

  function nextMonth() {
    currentMonth++;
    if (currentMonth > 12) {
      currentMonth = 1;
      currentYear++;
    }
    renderCalendar();
  }

  // ════════════════════════════════════════════════════════════
  // 초기화
  // ════════════════════════════════════════════════════════════
  checkAuth();
</script>

</body>
</html>
