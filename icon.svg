<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- 골드 그라디언트 -->
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5d680"/>
      <stop offset="50%" stop-color="#d4a843"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <linearGradient id="goldLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe4a0"/>
      <stop offset="100%" stop-color="#d4a843"/>
    </linearGradient>
  </defs>

  <!-- 배경: 깊은 남색 -->
  <rect width="512" height="512" rx="96" fill="#0a0e1a"/>

  <!-- 외곽 원 (가몬 스타일 이중원) -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#gold)" stroke-width="3"/>
  <circle cx="256" cy="256" r="205" fill="none" stroke="url(#gold)" stroke-width="1.2" opacity="0.5"/>

  <!-- 가몬 장식: 꽃잎 패턴 (6방향) -->
  <g opacity="0.35" stroke="url(#gold)" stroke-width="1.5" fill="none">
    <!-- 상 -->
    <path d="M256,50 Q270,80 256,110 Q242,80 256,50Z" fill="url(#gold)" opacity="0.3"/>
    <!-- 하 -->
    <path d="M256,462 Q270,432 256,402 Q242,432 256,462Z" fill="url(#gold)" opacity="0.3"/>
    <!-- 좌 -->
    <path d="M50,256 Q80,242 110,256 Q80,270 50,256Z" fill="url(#gold)" opacity="0.3"/>
    <!-- 우 -->
    <path d="M462,256 Q432,242 402,256 Q432,270 462,256Z" fill="url(#gold)" opacity="0.3"/>
    <!-- 좌상 -->
    <path d="M110,110 Q135,120 125,145 Q115,120 110,110Z" fill="url(#gold)" opacity="0.2"/>
    <!-- 우상 -->
    <path d="M402,110 Q377,120 387,145 Q397,120 402,110Z" fill="url(#gold)" opacity="0.2"/>
    <!-- 좌하 -->
    <path d="M110,402 Q135,392 125,367 Q115,392 110,402Z" fill="url(#gold)" opacity="0.2"/>
    <!-- 우하 -->
    <path d="M402,402 Q377,392 387,367 Q397,392 402,402Z" fill="url(#gold)" opacity="0.2"/>
  </g>

  <!-- 내곽 장식 원 -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.25"/>

  <!-- 가몬 십자 장식선 -->
  <g stroke="url(#gold)" stroke-width="0.8" opacity="0.2">
    <line x1="256" y1="96" x2="256" y2="160"/>
    <line x1="256" y1="352" x2="256" y2="416"/>
    <line x1="96" y1="256" x2="160" y2="256"/>
    <line x1="352" y1="256" x2="416" y2="256"/>
  </g>

  <!-- TW 글자: 세리프 + 가몬 느낌 -->
  <text x="256" y="290" text-anchor="middle" font-family="'Times New Roman','Georgia',serif" font-size="155" font-weight="700" fill="url(#goldLight)" letter-spacing="-8">TW</text>

  <!-- TW 글자 안쪽 라인 효과 -->
  <text x="256" y="290" text-anchor="middle" font-family="'Times New Roman','Georgia',serif" font-size="155" font-weight="700" fill="none" stroke="url(#gold)" stroke-width="0.5" letter-spacing="-8" opacity="0.4">TW</text>

  <!-- 하단 작은 장식 -->
  <g opacity="0.4">
    <line x1="190" y1="350" x2="322" y2="350" stroke="url(#gold)" stroke-width="1"/>
    <circle cx="190" cy="350" r="2" fill="url(#gold)"/>
    <circle cx="322" cy="350" r="2" fill="url(#gold)"/>
    <circle cx="256" cy="350" r="1.5" fill="url(#gold)"/>
  </g>
</svg>
