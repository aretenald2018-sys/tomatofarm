<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5d680"/>
      <stop offset="50%" stop-color="#d4a843"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <linearGradient id="g2" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffe4a0"/>
      <stop offset="100%" stop-color="#c49530"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" rx="96" fill="#0a0e1a"/>

  <!-- 외곽 가몬 원 -->
  <circle cx="256" cy="256" r="224" fill="none" stroke="url(#g1)" stroke-width="2.5"/>
  <circle cx="256" cy="256" r="212" fill="none" stroke="url(#g1)" stroke-width="0.8" opacity="0.4"/>

  <!-- 내곽 팔각형 프레임 -->
  <polygon points="256,68 393,130 430,268 393,405 256,462 119,405 82,268 119,130"
           fill="none" stroke="url(#g1)" stroke-width="1" opacity="0.2"/>

  <!-- T: 토리이(鳥居) 문 형상 — 상단 가로보 + 중심 기둥 -->
  <!-- 상단 가로보 (지붕처럼 살짝 곡선) -->
  <path d="M148,155 Q256,135 364,155" fill="none" stroke="url(#g2)" stroke-width="10" stroke-linecap="round"/>
  <!-- 가로보 아래 받침선 -->
  <path d="M165,172 Q256,160 347,172" fill="none" stroke="url(#g2)" stroke-width="5" stroke-linecap="round"/>
  <!-- 중심 기둥 -->
  <line x1="256" y1="172" x2="256" y2="295" stroke="url(#g2)" stroke-width="9" stroke-linecap="round"/>

  <!-- W: 산(山) 봉우리 3개 형상 — 기둥 아래에서 갈라짐 -->
  <!-- 왼쪽 봉우리 -->
  <path d="M256,295 L175,410" fill="none" stroke="url(#g2)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 왼쪽 되돌아옴 -->
  <path d="M175,410 L216,340" fill="none" stroke="url(#g2)" stroke-width="7" stroke-linecap="round"/>
  <!-- 중앙 봉우리 -->
  <path d="M216,340 L256,420" fill="none" stroke="url(#g2)" stroke-width="7" stroke-linecap="round"/>
  <!-- 오른쪽 되돌아옴 -->
  <path d="M256,420 L296,340" fill="none" stroke="url(#g2)" stroke-width="7" stroke-linecap="round"/>
  <!-- 오른쪽 봉우리 -->
  <path d="M296,340 L337,410" fill="none" stroke="url(#g2)" stroke-width="8" stroke-linecap="round"/>

  <!-- 장식: T 양쪽 끝 마루가와라(丸瓦) 느낌의 원 -->
  <circle cx="148" cy="155" r="8" fill="url(#g1)" opacity="0.6"/>
  <circle cx="364" cy="155" r="8" fill="url(#g1)" opacity="0.6"/>

  <!-- 장식: T-W 연결부 다이아몬드 -->
  <polygon points="256,282 268,295 256,308 244,295" fill="url(#g1)" opacity="0.5"/>

  <!-- 장식: 4방향 작은 꽃잎 (가몬 느낌) -->
  <g opacity="0.25" fill="url(#g1)">
    <ellipse cx="256" cy="55" rx="4" ry="10"/>
    <ellipse cx="256" cy="462" rx="4" ry="10"/>
    <ellipse cx="55" cy="256" rx="10" ry="4"/>
    <ellipse cx="457" cy="256" rx="10" ry="4"/>
  </g>

  <!-- 장식: 대각선 작은 점 (팔방) -->
  <g fill="url(#g1)" opacity="0.15">
    <circle cx="108" cy="108" r="3"/>
    <circle cx="404" cy="108" r="3"/>
    <circle cx="108" cy="404" r="3"/>
    <circle cx="404" cy="404" r="3"/>
  </g>
</svg>
